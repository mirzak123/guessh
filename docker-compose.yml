services:
  guessh-gamed:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: guessh-gamed
    container_name: guessh-gamed
    ports:
      - "127.0.0.1:2480:2480"
    environment:
      - GUESSH_SERVER_PORT=2480
      - WORDS_PATH=./words
    restart: always

  guessh-sshd:
    build:
      context: .
      dockerfile: cli/Dockerfile
    image: guessh-sshd
    container_name: guessh-sshd
    ports:
      - "22:2222"
    environment:
      - GAME_SERVER_ADDR=guessh-gamed:2480
      - GUESSH_SSH_ADDR=0.0.0.0:2222
      - WORDS_PATH=./words
      - HOST_KEY_PATH=/app/.ssh/id_ed25519
    volumes:
      - guessh_ssh_keys:/app/.ssh
    depends_on:
      - guessh-gamed
    restart: always

volumes:
  guessh_ssh_keys:
